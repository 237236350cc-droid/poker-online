<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多人德州扑克 · 在线好友桌</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0a2a12 100%);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .room-panel {
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .room-panel input, .room-panel button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 60px;
            border: none;
            font-size: 16px;
        }
        .room-panel input { background: #fff2cf; width: 200px; }
        .room-panel button { background: #f4c542; font-weight: bold; cursor: pointer; }
        .game-area { display: none; }
        .table {
            background: radial-gradient(circle at 30% 25%, #2b7a3e, #083017);
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .community { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; min-height: 120px; }
        .card {
            width: 70px; height: 96px; background: white; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; background: #fffef7;
        }
        .card[data-suit="♥"], .card[data-suit="♦"] { color: #c33; }
        .card-rank { font-size: 34px; }
        .card-suit { font-size: 30px; }
        .pot { text-align: center; margin: 15px; color: gold; font-weight: bold; font-size: 20px; }
        .players-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .player-item {
            background: #1e1e2fe6; border-radius: 28px; padding: 12px; color: white;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .player-item.active { background: #2c5432e6; border: 2px solid #ffdf7e; }
        .player-hand { display: flex; justify-content: center; gap: 8px; margin: 10px 0; }
        .player-hand .card { width: 50px; height: 70px; }
        .actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .actions button { padding: 8px 16px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; }
        .status { background: #000000aa; border-radius: 40px; padding: 12px; text-align: center; color: #ffefb5; margin-top: 20px; }
        @media (max-width: 700px) {
            .card { width: 55px; height: 78px; }
            .card-rank { font-size: 26px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="lobby" class="room-panel">
        <h2 style="color:white;">🎲 多人德州扑克</h2>
        <input type="text" id="playerName" placeholder="你的名字" value="玩家">
        <input type="number" id="startingChips" placeholder="起始筹码" value="2000">
        <div>
            <button id="createRoomBtn">🏠 创建房间</button>
            <input type="text" id="joinRoomId" placeholder="房间号" style="width:120px;">
            <button id="joinRoomBtn">🚪 加入房间</button>
        </div>
        <div id="roomInfo" style="color:#ffefb5; margin-top:20px;"></div>
    </div>
    
    <div id="gameArea" class="game-area">
        <div class="table">
            <div class="community" id="communityCards"></div>
            <div class="pot" id="potDisplay">💰 底池: 0</div>
        </div>
        <div class="players-list" id="playersList"></div>
        <div class="status" id="gameStatus">等待游戏开始...</div>
        <div class="actions" id="actionButtons" style="display:none;">
            <button id="foldBtn">🙅 弃牌</button>
            <button id="callBtn">🎲 跟注</button>
            <button id="raiseBtn20">📈 +20</button>
            <button id="raiseBtn100">📈 +100</button>
            <button id="raiseBtn500">📈 +500</button>
            <button id="allinBtn">⚡ All-in</button>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let roomId = null;
    let myId = null;
    let currentGameState = null;
    
    const lobby = document.getElementById('lobby');
    const gameArea = document.getElementById('gameArea');
    const roomInfo = document.getElementById('roomInfo');
    
    function showGame() { lobby.style.display = 'none'; gameArea.style.display = 'block'; }
    
    function renderGame(state) {
        currentGameState = state;
        const communityDiv = document.getElementById('communityCards');
        communityDiv.innerHTML = '';
        if (state.communityCards) {
            for (let card of state.communityCards) {
                let div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `<div class="card-rank">${card.rank}</div><div class="card-suit">${card.suit}</div>`;
                communityDiv.appendChild(div);
            }
        }
        document.getElementById('potDisplay').innerHTML = `💰 底池: ${state.pot}`;
        
        const playersList = document.getElementById('playersList');
        playersList.innerHTML = '';
        for (let i = 0; i < state.players.length; i++) {
            const p = state.players[i];
            const isActive = (state.currentPlayerIndex === i && !state.gameEnded);
            const div = document.createElement('div'); div.className = `player-item ${isActive ? 'active' : ''}`;
            let handHtml = '';
            if (p.folded) {
                handHtml = `<div class="card back"></div><div class="card back"></div>`;
            } else if (p.hand && p.hand.length === 2 && p.hand[0].rank) {
                handHtml = p.hand.map(c => `<div class="card"><div class="card-rank">${c.rank}</div><div class="card-suit">${c.suit}</div></div>`).join('');
            } else {
                handHtml = `<div class="card back"></div><div class="card back"></div>`;
            }
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <strong>${p.name}</strong>
                    <span style="background:#f4b942; padding:2px 10px; border-radius:20px;">💰 ${p.chips}</span>
                </div>
                <div class="player-hand">${handHtml}</div>
                <div>下注: ${p.bet}</div>
                ${p.folded ? '<div style="color:#ffaaaa;">已弃牌</div>' : ''}
            `;
            playersList.appendChild(div);
        }
        
        const actionDiv = document.getElementById('actionButtons');
        const isMyTurn = (state.currentPlayerIndex !== undefined && state.players[state.currentPlayerIndex] && state.players[state.currentPlayerIndex].id === myId && !state.gameEnded);
        actionDiv.style.display = isMyTurn ? 'flex' : 'none';
        if (isMyTurn) {
            let need = state.lastBet - (state.players[state.currentPlayerIndex]?.currentBet || 0);
            document.getElementById('callBtn').innerHTML = `🎲 跟注 ${need}`;
            document.getElementById('gameStatus').innerHTML = `🎲 轮到你了！ 需跟注: ${need} | 底池: ${state.pot}`;
        } else if (state.gameEnded) {
            document.getElementById('gameStatus').innerHTML = `🏆 牌局结束，点击上方按钮开始新游戏 🏆`;
        } else {
            document.getElementById('gameStatus').innerHTML = `⏳ 等待 ${state.players[state.currentPlayerIndex]?.name} 行动...`;
        }
    }
    
    document.getElementById('createRoomBtn').onclick = () => {
        const playerName = document.getElementById('playerName').value || '玩家';
        const startingChips = parseInt(document.getElementById('startingChips').value) || 2000;
        socket = io();
        socket.on('connect', () => {
            socket.emit('createRoom', { playerName, startingChips });
        });
        socket.on('roomCreated', (data) => {
            roomId = data.roomId;
            myId = data.playerId;
            roomInfo.innerHTML = `房间号: <strong style="font-size:24px;">${roomId}</strong><br>分享此号码给朋友！`;
            showGame();
        });
        socket.on('gameState', renderGame);
        socket.on('playerJoined', (data) => {
            roomInfo.innerHTML = `房间号: ${roomId}<br>已加入: ${data.players.map(p=>p.name).join(', ')}`;
        });
        socket.on('gameMessage', (msg) => {
            document.getElementById('gameStatus').innerHTML = msg;
        });
        socket.on('playerLeft', (data) => {
            roomInfo.innerHTML = `房间号: ${roomId}<br>在线: ${data.players.map(p=>p.name).join(', ')}`;
        });
    };
    
    document.getElementById('joinRoomBtn').onclick = () => {
        const roomIdInput = document.getElementById('joinRoomId').value;
        const playerName = document.getElementById('playerName').value || '玩家';
        const startingChips = parseInt(document.getElementById('startingChips').value) || 2000;
        if (!roomIdInput) return;
        socket = io();
        socket.on('connect', () => {
            socket.emit('joinRoom', { roomId: roomIdInput, playerName, startingChips });
        });
        socket.on('roomCreated', (data) => {
            roomId = data.roomId;
            myId = data.playerId;
            showGame();
        });
        socket.on('gameState', renderGame);
        socket.on('playerJoined', (data) => {
            document.getElementById('gameStatus').innerHTML = `玩家加入: ${data.players.map(p=>p.name).join(', ')}`;
        });
        socket.on('error', (msg) => { alert(msg); });
    };
    
    function sendAction(action, amount) {
        if (socket && roomId) {
            socket.emit('playerAction', { roomId, action, amount });
        }
    }
    
    document.getElementById('foldBtn')?.addEventListener('click', () => sendAction('fold'));
    document.getElementById('callBtn')?.addEventListener('click', () => sendAction('call'));
    document.getElementById('raiseBtn20')?.addEventListener('click', () => sendAction('raise', 20));
    document.getElementById('raiseBtn100')?.addEventListener('click', () => sendAction('raise', 100));
    document.getElementById('raiseBtn500')?.addEventListener('click', () => sendAction('raise', 500));
    document.getElementById('allinBtn')?.addEventListener('click', () => {
        if (currentGameState && currentGameState.players) {
            let myChips = currentGameState.players.find(p => p.id === myId)?.chips || 0;
            sendAction('raise', myChips);
        }
    });
</script>
</body>
</html>
