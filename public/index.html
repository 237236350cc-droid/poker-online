<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多人德州扑克</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #1a472a 0%, #0a2a12 100%);
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .room-panel {
            background: rgba(0,0,0,0.7);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
        }
        .room-panel input, .room-panel button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 60px;
            border: none;
            font-size: 16px;
        }
        .room-panel input { background: #fff2cf; width: 200px; }
        .room-panel button { background: #f4c542; font-weight: bold; cursor: pointer; }
        .game-area { display: none; }
        .table {
            background: radial-gradient(circle at 30% 25%, #2b7a3e, #083017);
            border-radius: 70px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .community { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; min-height: 120px; }
        .card {
            width: 70px; height: 96px; background: white; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: -2px 2px 6px rgba(0,0,0,0.2);
        }
        .card[data-suit="♥"], .card[data-suit="♦"] { color: #c33; }
        .card-rank { font-size: 34px; font-weight: bold; }
        .card-suit { font-size: 30px; }
        .card.back {
            background: repeating-linear-gradient(45deg, #2c5a7a, #2c5a7a 12px, #1d4468 12px, #1d4468 24px);
        }
        .card.back::after { content: "?"; font-size: 32px; color: #ffdd99; display: flex; align-items: center; justify-content: center; height: 100%; }
        .pot { text-align: center; margin: 15px; color: gold; font-weight: bold; font-size: 22px; }
        .players-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .player-item {
            background: #1e1e2fe6; border-radius: 28px; padding: 12px; color: white;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .player-item.active { background: #2c5432e6; border: 2px solid #ffdf7e; }
        .player-hand { display: flex; justify-content: center; gap: 8px; margin: 10px 0; min-height: 85px; }
        .player-hand .card { width: 55px; height: 78px; }
        .actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .actions button { padding: 8px 16px; border-radius: 40px; border: none; font-weight: bold; cursor: pointer; background: #f4c542; }
        .status { background: #000000aa; border-radius: 40px; padding: 12px; text-align: center; color: #ffefb5; margin-top: 20px; white-space: pre-line; }
        .room-header {
            background: #00000099;
            border-radius: 30px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .room-code { font-size: 20px; font-weight: bold; color: #ffd966; }
        .online-count { background: #2ecc71; padding: 5px 15px; border-radius: 30px; color: white; }
        .start-btn, .reset-btn { padding: 8px 25px; font-size: 16px; color: white; }
        .start-btn { background: #e67e22; }
        .reset-btn { background: #3498db; }
        .waiting-list { background: #00000066; border-radius: 30px; padding: 15px; margin-top: 15px; text-align: center; }
        @media (max-width: 700px) {
            .card { width: 55px; height: 78px; }
            .player-hand .card { width: 45px; height: 65px; }
            .card-rank { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="lobby" class="room-panel">
        <h2 style="color:white;">🎲 多人德州扑克</h2>
        <input type="text" id="playerName" placeholder="你的名字" value="玩家">
        <input type="number" id="startingChips" placeholder="起始筹码" value="2000">
        <div>
            <button id="createRoomBtn">🏠 创建房间</button>
            <input type="text" id="joinRoomId" placeholder="房间号" style="width:120px;">
            <button id="joinRoomBtn">🚪 加入房间</button>
        </div>
        <div id="roomInfo" style="color:#ffefb5; margin-top:20px;"></div>
    </div>
    
    <div id="gameArea" class="game-area">
        <div class="room-header">
            <span class="room-code" id="roomCodeDisplay">房间号: ---</span>
            <span class="online-count" id="onlineCount">👥 0人</span>
            <div>
                <button id="resetGameBtn" class="reset-btn" style="display:none;">🔄 重置牌局</button>
                <button id="manualStartBtn" class="start-btn" style="display:none;">▶ 开始游戏</button>
            </div>
        </div>
        <div class="table">
            <div class="community" id="communityCards"></div>
            <div class="pot" id="potDisplay">💰 底池: 0</div>
        </div>
        <div class="players-list" id="playersList"></div>
        <div id="waitingArea" class="waiting-list" style="display:none;">
            ⏳ 等待更多玩家... (至少2人)<br>
            <small>分享房间号给朋友</small>
        </div>
        <div class="status" id="gameStatus">等待游戏开始...</div>
        <div class="actions" id="actionButtons" style="display:none;">
            <button id="foldBtn">🙅 弃牌</button>
            <button id="checkBtn">✅ 过牌</button>
            <button id="callBtn">🎲 跟注</button>
            <button id="raiseBtn20">📈 +20</button>
            <button id="raiseBtn100">📈 +100</button>
            <button id="raiseBtn500">📈 +500</button>
            <button id="allinBtn">⚡ All-in</button>
        </div>
    </div>
</div>

<script>
    let socket = null, roomId = null, myId = null, currentGameState = null, isHost = false;
    
    function showGame() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
    }
    
    function updateUI(state) {
        console.log('收到游戏状态, myId:', state.myId);
        currentGameState = state;
        
        // 关键：更新自己的ID
        if (state.myId) {
            myId = state.myId;
        }
        
        document.getElementById('potDisplay').innerHTML = `💰 底池: ${state.pot}`;
        
        // 公共牌
        const communityDiv = document.getElementById('communityCards');
        communityDiv.innerHTML = '';
        if (state.communityCards && state.communityCards.length > 0) {
            for (let card of state.communityCards) {
                let div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `<div class="card-rank">${card.rank}</div><div class="card-suit">${card.suit}</div>`;
                communityDiv.appendChild(div);
            }
        }
        
        // 玩家列表
        const playersDiv = document.getElementById('playersList');
        playersDiv.innerHTML = '';
        if (state.players) {
            for (let i = 0; i < state.players.length; i++) {
                const p = state.players[i];
                const isActive = (state.gameStarted && state.currentPlayerIndex === i && !state.gameEnded);
                const div = document.createElement('div');
                div.className = `player-item ${isActive ? 'active' : ''}`;
                
                // 关键修复：只有自己的手牌才显示真牌
                const isMe = (p.id === myId);
                let handHtml = '';
                if (p.folded) {
                    handHtml = `<div class="card back"></div><div class="card back"></div>`;
                } else if (isMe && p.hand && p.hand.length === 2) {
                    // 显示自己的真牌
                    handHtml = p.hand.map(c => `
                        <div class="card">
                            <div class="card-rank">${c.rank}</div>
                            <div class="card-suit">${c.suit}</div>
                        </div>
                    `).join('');
                } else {
                    handHtml = `<div class="card back"></div><div class="card back"></div>`;
                }
                
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${p.name} ${isMe ? '(你)' : ''}</strong>
                        <span style="background:#f4b942; padding:2px 10px; border-radius:20px;">💰 ${p.chips}</span>
                    </div>
                    <div class="player-hand">${handHtml}</div>
                    <div>下注: ${p.bet}</div>
                    ${p.folded ? '<div style="color:#ffaaaa;">已弃牌</div>' : ''}
                `;
                playersDiv.appendChild(div);
            }
            document.getElementById('onlineCount').innerHTML = `👥 ${state.players.length}人`;
        }
        
        // 动态按钮显示
        const actionDiv = document.getElementById('actionButtons');
        const isMyTurn = (state.gameStarted && state.currentPlayerIndex !== undefined && state.players && state.players[state.currentPlayerIndex] && state.players[state.currentPlayerIndex].id === myId && !state.gameEnded);
        actionDiv.style.display = isMyTurn ? 'flex' : 'none';
        
        if (isMyTurn && state.players) {
            const need = state.lastBet - (state.players[state.currentPlayerIndex]?.currentBet || 0);
            const checkBtn = document.getElementById('checkBtn');
            const callBtn = document.getElementById('callBtn');
            
            if (need === 0) {
                checkBtn.style.display = 'inline-block';
                callBtn.style.display = 'none';
            } else {
                checkBtn.style.display = 'none';
                callBtn.style.display = 'inline-block';
                callBtn.innerHTML = `🎲 跟注 ${need}`;
            }
        }
        
        const waitingDiv = document.getElementById('waitingArea');
        const startBtn = document.getElementById('manualStartBtn');
        const resetBtn = document.getElementById('resetGameBtn');
        
        if (state.gameEnded) {
            waitingDiv.style.display = 'none';
            startBtn.style.display = 'none';
            if (isHost) resetBtn.style.display = 'inline-block';
            else resetBtn.style.display = 'none';
        } else if (!state.gameStarted) {
            waitingDiv.style.display = state.players.length >= 2 ? 'none' : 'block';
            if (isHost && state.players.length >= 2) {
                startBtn.style.display = 'inline-block';
                resetBtn.style.display = 'none';
            } else {
                startBtn.style.display = 'none';
                resetBtn.style.display = 'none';
            }
            document.getElementById('gameStatus').innerHTML = `⏳ 等待玩家 (${state.players.length}/6人)${isHost ? '，你是房主' : ''}`;
        } else if (isMyTurn) {
            let need = state.lastBet - (state.players[state.currentPlayerIndex]?.currentBet || 0);
            document.getElementById('gameStatus').innerHTML = `🎲 轮到你了！ ${need > 0 ? `需跟注: ${need}` : '可以过牌'} | 底池: ${state.pot}`;
        } else {
            document.getElementById('gameStatus').innerHTML = `⏳ 等待 ${state.players?.[state.currentPlayerIndex]?.name} 行动...`;
        }
    }
    
    // 创建房间
    document.getElementById('createRoomBtn').onclick = () => {
        const playerName = document.getElementById('playerName').value || '玩家';
        const startingChips = parseInt(document.getElementById('startingChips').value) || 2000;
        socket = io({ transports: ['websocket', 'polling'] });
        socket.on('connect', () => socket.emit('createRoom', { playerName, startingChips }));
        socket.on('roomCreated', (data) => {
            roomId = data.roomId; myId = data.playerId; isHost = true;
            document.getElementById('roomCodeDisplay').innerHTML = `🏠 房间号: ${roomId}`;
            showGame();
        });
        socket.on('gameState', updateUI);
        socket.on('playerJoined', (data) => {});
        socket.on('gameMessage', (msg) => document.getElementById('gameStatus').innerHTML = msg);
        socket.on('error', (msg) => alert(msg));
    };
    
    // 加入房间
    document.getElementById('joinRoomBtn').onclick = () => {
        const roomIdInput = document.getElementById('joinRoomId').value;
        const playerName = document.getElementById('playerName').value || '玩家';
        if (!roomIdInput) return;
        socket = io({ transports: ['websocket', 'polling'] });
        socket.on('connect', () => socket.emit('joinRoom', { roomId: roomIdInput, playerName }));
        socket.on('joinSuccess', (data) => {
            roomId = data.roomId; myId = data.playerId; isHost = false;
            document.getElementById('roomCodeDisplay').innerHTML = `🏠 房间号: ${roomId}`;
            showGame();
        });
        socket.on('gameState', updateUI);
        socket.on('gameMessage', (msg) => document.getElementById('gameStatus').innerHTML = msg);
        socket.on('error', (msg) => alert(msg));
    };
    
    document.getElementById('manualStartBtn').onclick = () => socket && roomId && socket.emit('startGame', { roomId });
    document.getElementById('resetGameBtn').onclick = () => socket && roomId && socket.emit('resetGame', { roomId });
    
    function sendAction(action, amount) { socket && roomId && socket.emit('playerAction', { roomId, action, amount }); }
    document.getElementById('foldBtn')?.addEventListener('click', () => sendAction('fold'));
    document.getElementById('checkBtn')?.addEventListener('click', () => sendAction('check'));
    document.getElementById('callBtn')?.addEventListener('click', () => sendAction('call'));
    document.getElementById('raiseBtn20')?.addEventListener('click', () => sendAction('raise', 20));
    document.getElementById('raiseBtn100')?.addEventListener('click', () => sendAction('raise', 100));
    document.getElementById('raiseBtn500')?.addEventListener('click', () => sendAction('raise', 500));
    document.getElementById('allinBtn')?.addEventListener('click', () => {
        let myChips = currentGameState?.players?.find(p => p.id === myId)?.chips || 0;
        sendAction('raise', myChips);
    });
</script>
</body>
</html>
